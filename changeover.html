<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIETNAM SAMHO | SMED | LEAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <strong>SAMHO</strong>
            <span>SMED HUB</span>
          </div>
        </div>

        <nav class="menu">
          <p>Main Menu</p>
          <a href="dashboard.html">
            <i data-lucide="layout-dashboard"></i>
            Dashboard
          </a>
          <a class="active" href="#">
            <i data-lucide="clipboard-list"></i>
            Changeovers
          </a>
        </nav>

        <div class="user-card">
          <div class="avatar"><i data-lucide="user-round"></i></div>
          <div>
            <strong>Admin</strong>
            <span>Roles.Administrator</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button class="icon-button mobile-menu" aria-label="Open menu">
            <i data-lucide="menu"></i>
          </button>
          <span class="section-label">Changeovers</span>

          <div class="top-actions">
            <div class="language-switch" aria-label="Language selector">
              <i data-lucide="globe-2"></i>
              <button>VI</button>
              <button>EN</button>
              <button>KO</button>
            </div>
            <button class="icon-button" aria-label="Toggle theme">
              <i data-lucide="sun"></i>
            </button>
            <div class="profile">
              <span><i data-lucide="user-round"></i></span>
              <div>
                <strong>Admin</strong>
                <small>Administrator</small>
              </div>
            </div>
          </div>
        </header>

        <section class="page-head">
          <div>
            <h1>Changeover Requests</h1>
            <p>Manage and track SMED operations</p>
          </div>

          <div class="view-actions">
            
            <a class="primary-button" href="new-request.html"><i data-lucide="plus"></i>New Request</a>
          </div>
        </section>

        <section class="search-panel search-panel-wide" aria-label="Search changeover requests">
          <label>
            <i data-lucide="search"></i>
            <input type="search" placeholder="Search by model or line..." data-request-search />
          </label>
          <button type="button" aria-label="Search filters" data-filter-toggle><i data-lucide="funnel"></i>Filters</button>
          <div class="filter-panel" data-filter-panel hidden>
            <label>
              <span>Status</span>
              <select data-filter-status>
                <option value="">All Statuses</option>
                <option value="Submitted">Submitted</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
              </select>
            </label>
            <label>
              <span>Classification</span>
              <select data-filter-classification>
                <option value="">All Classifications</option>
                <option value="Planned">Planned</option>
                <option value="Delayed">Delayed</option>
                <option value="Unplanned">Unplanned</option>
              </select>
            </label>
            <label>
              <span>Process</span>
              <select data-filter-process>
                <option value="">All Processes</option>
                <option value="Line Changeover">Line Changeover</option>
                <option value="Mold Changeover">Mold Changeover</option>
              </select>
            </label>
            <label>
              <span>Line</span>
              <select data-filter-line>
                <option value="">All Lines</option>
              </select>
            </label>
            <button type="button" class="secondary-button" data-filter-clear><i data-lucide="rotate-ccw"></i>Clear</button>
          </div>
        </section>

        <section class="cards-grid" aria-label="Changeover request cards" data-request-grid></section>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
